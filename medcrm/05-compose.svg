<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" font-family="Inter, system-ui, sans-serif">
  <title>medcrm — Compose Drawer</title>
  <rect width="1440" height="900" fill="#FFFFFF"/>

  <!-- Faint background — profile page -->
  <g opacity="0.4">
    <rect x="0" y="0" width="260" height="900" fill="#F4F4F5"/>
    <line x1="260" y1="0" x2="260" y2="900" stroke="#E4E4E7"/>
    <text x="296" y="92" font-size="32" font-weight="700" fill="#A1A1AA">Priya Sharma</text>
    <text x="296" y="120" font-size="14" fill="#A1A1AA">+91 91234 56789</text>
    <line x1="296" y1="232" x2="900" y2="232" stroke="#E4E4E7"/>
    <line x1="296" y1="346" x2="900" y2="346" stroke="#E4E4E7"/>
  </g>

  <!-- Backdrop -->
  <rect width="1440" height="900" fill="#0F172A" opacity="0.16"/>

  <!-- ─────── DRAWER (right) ─────── -->
  <rect x="848" y="0" width="592" height="900" fill="#FFFFFF"/>
  <line x1="848" y1="0" x2="848" y2="900" stroke="#E4E4E7"/>

  <!-- Header -->
  <rect x="848" y="0" width="592" height="80" fill="#FFFFFF"/>
  <line x1="848" y1="80" x2="1440" y2="80" stroke="#E4E4E7"/>

  <text x="876" y="40" font-size="18" font-weight="700" fill="#0F172A">New message</text>
  <text x="876" y="60" font-size="12" fill="#71717A">via WhatsApp Business · Medstocksy</text>
  <circle cx="1408" cy="40" r="16" fill="#F4F4F5"/>
  <text x="1408" y="46" font-size="14" fill="#52525B" text-anchor="middle">✕</text>

  <!-- Recipient -->
  <text x="876" y="120" font-size="11" font-weight="600" fill="#A1A1AA" letter-spacing="1">RECIPIENT</text>
  <rect x="876" y="132" width="540" height="68" rx="14" fill="#FAFAFA"/>
  <circle cx="906" cy="166" r="20" fill="#FEF3C7"/>
  <text x="906" y="172" font-size="13" font-weight="700" fill="#92400E" text-anchor="middle">PS</text>
  <text x="936" y="160" font-size="14" font-weight="600" fill="#0F172A">Priya Sharma</text>
  <text x="936" y="178" font-size="12" font-family="JetBrains Mono, monospace" fill="#71717A">+91 91234 56789</text>
  <rect x="1340" y="148" width="76" height="36" rx="18" fill="#D1FAE5"/>
  <text x="1378" y="170" font-size="11" font-weight="700" fill="#047857" text-anchor="middle">OPTED IN</text>

  <!-- Tabs -->
  <text x="876" y="240" font-size="14" font-weight="600" fill="#0F172A">Template</text>
  <line x1="876" y1="250" x2="940" y2="250" stroke="#3B82F6" stroke-width="2"/>
  <text x="956" y="240" font-size="14" font-weight="500" fill="#71717A">Custom message</text>

  <!-- Template select -->
  <text x="876" y="282" font-size="13" font-weight="500" fill="#0F172A">Choose template</text>
  <rect x="876" y="290" width="540" height="48" rx="12" fill="#FFFFFF" stroke="#E4E4E7"/>
  <text x="894" y="319" font-size="14" fill="#0F172A">T2 · Refill reminder</text>
  <text x="1402" y="319" font-size="14" fill="#71717A" text-anchor="end">▾</text>
  <text x="876" y="360" font-size="11" fill="#71717A">Pre-approved by WhatsApp. Required outside the 24-hour window.</text>

  <!-- Vars -->
  <g>
    <text x="876" y="402" font-size="13" font-weight="500" fill="#0F172A">Medicine</text>
    <rect x="876" y="410" width="260" height="48" rx="12" fill="#FFFFFF" stroke="#E4E4E7"/>
    <text x="894" y="439" font-size="14" fill="#0F172A">Cough syrup</text>
    <text x="1122" y="439" font-size="14" fill="#71717A" text-anchor="end">▾</text>

    <text x="1156" y="402" font-size="13" font-weight="500" fill="#0F172A">Pharmacy phone</text>
    <rect x="1156" y="410" width="260" height="48" rx="12" fill="#FFFFFF" stroke="#E4E4E7"/>
    <text x="1174" y="439" font-size="14" font-family="JetBrains Mono, monospace" fill="#0F172A">+91 95555 12345</text>
  </g>

  <!-- Preview -->
  <text x="876" y="500" font-size="13" font-weight="500" fill="#0F172A">Preview</text>
  <rect x="876" y="510" width="540" height="172" rx="14" fill="#E7FFDB" stroke="#BFE5A6"/>

  <text x="900" y="544" font-size="14" fill="#0F172A">Hi <tspan font-weight="700">Priya</tspan>,</text>
  <text x="900" y="572" font-size="14" fill="#0F172A">Time to refill your <tspan font-weight="700">Cough syrup</tspan>?</text>
  <text x="900" y="592" font-size="14" fill="#0F172A">We have it in stock.</text>
  <text x="900" y="624" font-size="14" fill="#0F172A">Call: <tspan font-family="JetBrains Mono, monospace" font-weight="600">+91 95555 12345</tspan></text>
  <text x="900" y="644" font-size="14" fill="#0F172A">Or visit our store.</text>

  <text x="1392" y="668" font-size="11" fill="#71717A" text-anchor="end" font-family="JetBrains Mono, monospace">2:34 PM ✓</text>

  <!-- ─────── STICKY FOOTER (safety + send) ─────── -->
  <line x1="848" y1="734" x2="1440" y2="734" stroke="#E4E4E7"/>
  <rect x="848" y="734" width="592" height="166" fill="#FAFAFA"/>

  <!-- Rate -->
  <text x="876" y="766" font-size="13" font-weight="600" fill="#0F172A">⏱  Sends this hour</text>
  <text x="1416" y="766" font-size="13" font-weight="700" fill="#F59E0B" text-anchor="end">7 / 10</text>
  <rect x="876" y="776" width="540" height="6" rx="3" fill="#FFFFFF" stroke="#E4E4E7"/>
  <rect x="876" y="776" width="378" height="6" rx="3" fill="#F59E0B"/>

  <!-- Window -->
  <text x="876" y="810" font-size="12" fill="#71717A">🕒  Send window 9 AM – 8 PM IST</text>
  <text x="1416" y="810" font-size="12" fill="#10B981" text-anchor="end" font-weight="600">✓ Within window</text>

  <!-- Buttons -->
  <rect x="876" y="828" width="260" height="52" rx="14" fill="#FFFFFF" stroke="#E4E4E7"/>
  <text x="1006" y="860" font-size="14" font-weight="600" fill="#0F172A" text-anchor="middle">📅  Schedule</text>

  <rect x="1156" y="828" width="260" height="52" rx="14" fill="#3B82F6"/>
  <text x="1286" y="860" font-size="14" font-weight="700" fill="#FFFFFF" text-anchor="middle">📤  Send now</text>

  <text x="876" y="20" font-family="JetBrains Mono, monospace" font-size="11" fill="#A1A1AA" opacity="0">05 / medcrm · Compose · 1440 × 900</text>
</svg>
