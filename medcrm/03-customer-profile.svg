    <rect x="1108" y="124" width="120" height="44" rx="22" fill="#FFFFFF" stroke="#E4E4E7"/>
    <text x="1168" y="151" font-size="13" font-weight="500" fill="#0F172A" text-anchor="middle">✏ Edit</text>

    <rect x="1238" y="124" width="178" height="44" rx="22" fill="#3B82F6"/>
    <text x="1327" y="151" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">📤  Send message</text>
