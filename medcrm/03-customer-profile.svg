  <g id="timeline">
    <!-- vertical line -->
    <line x1="332" y1="430" x2="332" y2="836" stroke="#E4E4E7"/>

    <!-- Event 1: msg sent -->
    <circle cx="332" cy="448" r="10" fill="#FFFFFF" stroke="#0EA5E9" stroke-width="3"/>
    <text x="358" y="436" font-size="11" fill="#A1A1AA">May 5 · 2:15 PM</text>
    <text x="358" y="456" font-size="14" font-weight="600" fill="#0F172A">Message sent · "Thank you for your purchase"</text>
    <text x="358" y="476" font-size="12" fill="#71717A">Status: Delivered · Template T1</text>

    <!-- Event 2: bill -->
    <circle cx="332" cy="528" r="10" fill="#FFFFFF" stroke="#3B82F6" stroke-width="3"/>
    <text x="358" y="516" font-size="11" fill="#A1A1AA">May 4 · 2:05 PM</text>
    <text x="358" y="536" font-size="14" font-weight="600" fill="#0F172A">Bill <tspan font-family="JetBrains Mono, monospace">#INV-5847</tspan> · ₹2,150</text>
    <text x="358" y="556" font-size="12" fill="#71717A">Vitamins (2), Cough syrup (1)</text>

    <!-- Event 3: reminder triggered -->
    <circle cx="332" cy="608" r="10" fill="#FFFFFF" stroke="#D97706" stroke-width="3"/>
    <text x="358" y="596" font-size="11" fill="#A1A1AA">Apr 28 · 1:30 PM</text>
    <text x="358" y="616" font-size="14" font-weight="600" fill="#0F172A">Reminder triggered · "Time to refill Cough syrup"</text>
    <text x="358" y="636" font-size="12" fill="#71717A">Status: Sent · <tspan fill="#10B981" font-weight="600">Customer purchased same day ✓</tspan></text>

    <!-- Event 4: bill -->
    <circle cx="332" cy="688" r="10" fill="#FFFFFF" stroke="#3B82F6" stroke-width="3"/>
    <text x="358" y="676" font-size="11" fill="#A1A1AA">Apr 28 · 10:30 AM</text>
    <text x="358" y="696" font-size="14" font-weight="600" fill="#0F172A">Bill <tspan font-family="JetBrains Mono, monospace">#INV-5821</tspan> · ₹1,890</text>
    <text x="358" y="716" font-size="12" fill="#71717A">Antibiotics (1), Cough syrup (1)</text>

    <!-- Event 5: note -->
    <circle cx="332" cy="768" r="10" fill="#FFFFFF" stroke="#71717A" stroke-width="3"/>
    <text x="358" y="756" font-size="11" fill="#A1A1AA">Apr 20 · 3:00 PM</text>
    <text x="358" y="776" font-size="14" font-weight="600" fill="#0F172A">Note added · "Prefers morning calls"</text>
    <text x="358" y="796" font-size="12" fill="#71717A">By Rajesh (Owner)</text>
  </g>

  <!-- Add note inline -->
  <rect x="296" y="824" width="700" height="48" rx="12" fill="#FAFAFA"/>
