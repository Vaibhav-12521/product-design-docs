    <text x="556" y="262" font-size="11" font-weight="600" fill="#A1A1AA" letter-spacing="1">LIFETIME SPEND</text>
    <text x="556" y="296" font-size="22" font-weight="700" fill="#0F172A" font-family="JetBrains Mono, monospace">₹7,240</text>
    <text x="556" y="318" font-size="12" fill="#71717A">12 purchases</text>

    <text x="816" y="262" font-size="11" font-weight="600" fill="#A1A1AA" letter-spacing="1">FREQUENCY</text>
    <text x="816" y="296" font-size="22" font-weight="700" fill="#0F172A">Every 17 days</text>
    <text x="816" y="318" font-size="12" fill="#71717A">Very consistent</text>

    <text x="1076" y="262" font-size="11" font-weight="600" fill="#A1A1AA" letter-spacing="1">MONTHLY AVG</text>
    <text x="1076" y="296" font-size="22" font-weight="700" fill="#0F172A" font-family="JetBrains Mono, monospace">₹1,795</text>
    <text x="1076" y="318" font-size="12" fill="#10B981">↑ 8% vs Apr</text>
