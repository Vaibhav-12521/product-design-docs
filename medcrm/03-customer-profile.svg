    <text x="1056" y="568" font-size="14" font-weight="600" fill="#0F172A">Top medicines bought</text>
    <g font-size="13">
      <text x="1056" y="600" fill="#0F172A">Cough syrup</text>
      <text x="1416" y="600" fill="#71717A" text-anchor="end" font-family="JetBrains Mono, monospace">5×</text>
      <rect x="1056" y="608" width="360" height="4" rx="2" fill="#F4F4F5"/>
      <rect x="1056" y="608" width="270" height="4" rx="2" fill="#3B82F6"/>

      <text x="1056" y="636" fill="#0F172A">Vitamins (D3 / B-complex)</text>
      <text x="1416" y="636" fill="#71717A" text-anchor="end" font-family="JetBrains Mono, monospace">4×</text>
      <rect x="1056" y="644" width="360" height="4" rx="2" fill="#F4F4F5"/>
      <rect x="1056" y="644" width="216" height="4" rx="2" fill="#3B82F6"/>

      <text x="1056" y="672" fill="#0F172A">Antibiotics</text>
      <text x="1416" y="672" fill="#71717A" text-anchor="end" font-family="JetBrains Mono, monospace">2×</text>
      <rect x="1056" y="680" width="360" height="4" rx="2" fill="#F4F4F5"/>
      <rect x="1056" y="680" width="108" height="4" rx="2" fill="#3B82F6"/>

      <text x="1056" y="708" fill="#0F172A">Pain relief</text>
      <text x="1416" y="708" fill="#71717A" text-anchor="end" font-family="JetBrains Mono, monospace">1×</text>
      <rect x="1056" y="716" width="360" height="4" rx="2" fill="#F4F4F5"/>
      <rect x="1056" y="716" width="54" height="4" rx="2" fill="#3B82F6"/>
    </g>

    <text x="1056" y="752" font-size="14" font-weight="600" fill="#0F172A">Communication preferences</text>
    <g font-size="12">
      <text x="1056" y="776" fill="#52525B">Channel</text>
      <text x="1416" y="776" fill="#0F172A" font-weight="600" text-anchor="end">WhatsApp</text>
      <text x="1056" y="798" fill="#52525B">Best time</text>
      <text x="1416" y="798" fill="#0F172A" font-weight="600" text-anchor="end">Morning · 9–11 AM</text>
      <text x="1056" y="820" fill="#52525B">Opt-in status</text>
      <text x="1416" y="820" fill="#10B981" font-weight="600" text-anchor="end">✓ Active</text>
    </g>
  </g>

  <text x="296" y="876" font-family="JetBrains Mono, monospace" font-size="11" fill="#A1A1AA">03 / medcrm · Customer profile · 1440 × 900</text>
</svg>
