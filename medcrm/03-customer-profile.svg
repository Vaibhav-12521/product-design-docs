<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" font-family="Inter, system-ui, sans-serif">
  <title>medcrm — Customer Profile</title>
  <rect width="1440" height="900" fill="#FFFFFF"/>

  <defs>
    <linearGradient id="side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FAFAFA"/>
      <stop offset="1" stop-color="#F4F4F5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="260" height="900" fill="url(#side)"/>
  <line x1="260" y1="0" x2="260" y2="900" stroke="#E4E4E7"/>
  <rect x="20" y="20" width="36" height="36" rx="9" fill="#3B82F6"/>
  <text x="38" y="43" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">M</text>
  <text x="68" y="36" font-size="14" font-weight="700" fill="#0F172A">Medstocksy</text>
  <text x="68" y="51" font-size="11" fill="#71717A">Customer Relations</text>
  <line x1="20" y1="76" x2="240" y2="76" stroke="#E4E4E7"/>

  <g font-size="14" font-weight="500" fill="#52525B">
    <text x="20" y="266" font-size="11" font-weight="600" fill="#A1A1AA" letter-spacing="1">CUSTOMER RELATIONS</text>
    <text x="48" y="298">Dashboard</text>
  </g>
  <rect x="14" y="312" width="232" height="40" rx="10" fill="#EFF6FF"/>
  <rect x="14" y="312" width="3" height="40" rx="2" fill="#3B82F6"/>
  <text x="48" y="338" font-size="14" font-weight="600" fill="#1D4ED8">Customers</text>
  <g font-size="14" font-weight="500" fill="#52525B">
    <text x="48" y="378">Segments</text>
    <text x="48" y="408">Campaigns</text>
    <text x="48" y="438">Reminders</text>
    <text x="48" y="468">Templates</text>
    <text x="48" y="498">Activity</text>
  </g>

  <!-- ─────── HEADER (breadcrumb + name) ─────── -->
  <text x="296" y="48" font-size="12" fill="#71717A">Customers › <tspan fill="#0F172A">Priya Sharma</tspan></text>
  <text x="296" y="60" font-size="12" fill="#3B82F6">‹ Back</text>

  <!-- ─────── HERO IDENTITY (clean, no card) ─────── -->
  <g id="hero">
    <circle cx="332" cy="148" r="44" fill="#FEF3C7"/>
    <text x="332" y="158" font-size="22" font-weight="700" fill="#92400E" text-anchor="middle">PS</text>

    <text x="396" y="124" font-size="32" font-weight="700" fill="#0F172A" letter-spacing="-0.5">Priya Sharma</text>
    <rect x="650" y="100" width="62" height="26" rx="4" fill="#D1FAE5"/>
    <text x="681" y="118" font-size="11" font-weight="700" fill="#047857" text-anchor="middle">ACTIVE</text>

    <text x="396" y="150" font-size="14" font-family="JetBrains Mono, monospace" fill="#52525B">+91 91234 56789</text>
    <text x="568" y="150" font-size="14" fill="#71717A">·  32 · Female  ·  Customer since Aug 2024</text>

    <!-- Tag row -->
    <rect x="396" y="170" width="64" height="26" rx="4" fill="#D1FAE5"/>
    <text x="428" y="188" font-size="12" font-weight="600" fill="#047857" text-anchor="middle">Repeat</text>
    <rect x="468" y="170" width="80" height="26" rx="4" fill="#FEF3C7"/>
    <text x="508" y="188" font-size="12" font-weight="600" fill="#92400E" text-anchor="middle">High Value</text>
    <rect x="556" y="170" width="76" height="26" rx="4" fill="#FFFFFF" stroke="#E4E4E7" stroke-dasharray="3,2"/>
    <text x="594" y="188" font-size="12" fill="#71717A" text-anchor="middle">+ Add tag</text>

