<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" font-family="Inter, system-ui, sans-serif">
  <title>medcrm — Segments</title>
  <rect width="1440" height="900" fill="#FFFFFF"/>

  <defs>
    <linearGradient id="side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FAFAFA"/>
      <stop offset="1" stop-color="#F4F4F5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="260" height="900" fill="url(#side)"/>
  <line x1="260" y1="0" x2="260" y2="900" stroke="#E4E4E7"/>
  <rect x="20" y="20" width="36" height="36" rx="9" fill="#3B82F6"/>
  <text x="38" y="43" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">M</text>
  <text x="68" y="36" font-size="14" font-weight="700" fill="#0F172A">Medstocksy</text>
  <text x="68" y="51" font-size="11" fill="#71717A">Customer Relations</text>
  <line x1="20" y1="76" x2="240" y2="76" stroke="#E4E4E7"/>

  <g font-size="14" font-weight="500" fill="#52525B">
    <text x="20" y="266" font-size="11" font-weight="600" fill="#A1A1AA" letter-spacing="1">CUSTOMER RELATIONS</text>
    <text x="48" y="298">Dashboard</text>
    <text x="48" y="338">Customers</text>
  </g>
  <rect x="14" y="352" width="232" height="40" rx="10" fill="#EFF6FF"/>
  <rect x="14" y="352" width="3" height="40" rx="2" fill="#3B82F6"/>
  <text x="48" y="378" font-size="14" font-weight="600" fill="#1D4ED8">Segments</text>
  <g font-size="14" font-weight="500" fill="#52525B">
    <text x="48" y="418">Campaigns</text>
    <text x="48" y="448">Reminders</text>
    <text x="48" y="478">Templates</text>
    <text x="48" y="508">Activity</text>
  </g>

  <!-- Header -->
  <text x="296" y="56" font-size="13" fill="#71717A">Customer Relations / Segments</text>
  <text x="296" y="92" font-size="32" font-weight="700" fill="#0F172A" letter-spacing="-0.5">Segments</text>
  <text x="296" y="118" font-size="14" fill="#71717A">Pre-built groups for targeted messaging. Activity-based, no filter builder needed.</text>

  <rect x="1306" y="68" width="110" height="44" rx="22" fill="#3B82F6"/>
  <text x="1361" y="94" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">+ Custom</text>

  <!-- Segment grid (3 cols × 2 rows) -->
  <g id="grid">
    <!-- New -->
    <g>
      <rect x="296" y="156" width="356" height="220" rx="20" fill="#FFFFFF" stroke="#E4E4E7"/>
      <circle cx="328" cy="188" r="20" fill="#DBEAFE"/>
      <text x="328" y="194" font-size="14" text-anchor="middle">✨</text>
      <text x="358" y="194" font-size="16" font-weight="700" fill="#0F172A">New customers</text>
      <text x="316" y="222" font-size="13" fill="#71717A">First purchase in last 7 days.</text>

      <text x="316" y="276" font-size="48" font-weight="700" fill="#0F172A" letter-spacing="-1">28</text>
      <text x="316" y="300" font-size="12" fill="#71717A">customers · ~8% of total</text>

      <line x1="316" y1="316" x2="632" y2="316" stroke="#F4F4F5"/>
      <text x="316" y="344" font-size="12" font-weight="500" fill="#3B82F6">Best for: welcome flow</text>
      <text x="632" y="344" font-size="12" font-weight="500" fill="#3B82F6" text-anchor="end">View list →</text>
    </g>

    <!-- Repeat -->
    <g>
      <rect x="672" y="156" width="356" height="220" rx="20" fill="#FFFFFF" stroke="#E4E4E7"/>
      <circle cx="704" cy="188" r="20" fill="#D1FAE5"/>
      <text x="704" y="194" font-size="14" text-anchor="middle">🔁</text>
      <text x="734" y="194" font-size="16" font-weight="700" fill="#0F172A">Repeat customers</text>
      <text x="692" y="222" font-size="13" fill="#71717A">2 or more purchases.</text>

      <text x="692" y="276" font-size="48" font-weight="700" fill="#0F172A" letter-spacing="-1">132</text>
      <text x="692" y="300" font-size="12" fill="#10B981">↑ +12 this month</text>

      <line x1="692" y1="316" x2="1008" y2="316" stroke="#F4F4F5"/>
      <text x="692" y="344" font-size="12" font-weight="500" fill="#3B82F6">Best for: loyalty offers</text>
      <text x="1008" y="344" font-size="12" font-weight="500" fill="#3B82F6" text-anchor="end">View list →</text>
    </g>

    <!-- High Value -->
    <g>
      <rect x="1048" y="156" width="368" height="220" rx="20" fill="#0F172A"/>
      <circle cx="1080" cy="188" r="20" fill="#FEF3C7"/>
      <text x="1080" y="194" font-size="14" text-anchor="middle">⭐</text>
      <text x="1110" y="194" font-size="16" font-weight="700" fill="#FFFFFF">High value</text>
      <text x="1068" y="222" font-size="13" fill="#A1A1AA">Lifetime spend &gt; ₹10,000.</text>

      <text x="1068" y="276" font-size="48" font-weight="700" fill="#FFFFFF" letter-spacing="-1">41</text>
      <text x="1068" y="300" font-size="12" fill="#A1A1AA">Avg LTV ₹18,640</text>

      <line x1="1068" y1="316" x2="1396" y2="316" stroke="#1E293B"/>
      <text x="1068" y="344" font-size="12" font-weight="500" fill="#FBBF24">Best for: premium offers</text>
      <text x="1396" y="344" font-size="12" font-weight="500" fill="#FBBF24" text-anchor="end">View list →</text>
    </g>

    <!-- Inactive -->
    <g>
      <rect x="296" y="396" width="356" height="220" rx="20" fill="#FFFFFF" stroke="#E4E4E7"/>
      <circle cx="328" cy="428" r="20" fill="#F4F4F5"/>
      <text x="328" y="434" font-size="14" text-anchor="middle">💤</text>
      <text x="358" y="434" font-size="16" font-weight="700" fill="#0F172A">Inactive</text>
      <text x="316" y="462" font-size="13" fill="#71717A">No purchase in 30+ days.</text>

      <text x="316" y="516" font-size="48" font-weight="700" fill="#0F172A" letter-spacing="-1">62</text>
      <text x="316" y="540" font-size="12" fill="#F59E0B">Avg 47 days inactive</text>

      <line x1="316" y1="556" x2="632" y2="556" stroke="#F4F4F5"/>
      <text x="316" y="584" font-size="12" font-weight="500" fill="#3B82F6">Best for: win-back</text>
      <text x="632" y="584" font-size="12" font-weight="500" fill="#3B82F6" text-anchor="end">View list →</text>
    </g>

    <!-- Chronic -->
    <g>
      <rect x="672" y="396" width="356" height="220" rx="20" fill="#FFFFFF" stroke="#E4E4E7"/>
      <circle cx="704" cy="428" r="20" fill="#EDE9FE"/>
      <text x="704" y="434" font-size="14" text-anchor="middle">⚕️</text>
      <text x="734" y="434" font-size="16" font-weight="700" fill="#0F172A">Chronic patients</text>
      <text x="692" y="462" font-size="13" fill="#71717A">Long-term medication buyers.</text>

      <text x="692" y="516" font-size="48" font-weight="700" fill="#0F172A" letter-spacing="-1">38</text>
      <text x="692" y="540" font-size="12" fill="#71717A">BP, Diabetes, Cardio</text>

      <line x1="692" y1="556" x2="1008" y2="556" stroke="#F4F4F5"/>
      <text x="692" y="584" font-size="12" font-weight="500" fill="#3B82F6">Best for: refill reminders</text>
      <text x="1008" y="584" font-size="12" font-weight="500" fill="#3B82F6" text-anchor="end">View list →</text>
    </g>

    <!-- OptOut (muted card) -->
    <g>
      <rect x="1048" y="396" width="368" height="220" rx="20" fill="#FAFAFA"/>
      <circle cx="1080" cy="428" r="20" fill="#FEE2E2"/>
      <text x="1080" y="434" font-size="14" text-anchor="middle">🔕</text>
      <text x="1110" y="434" font-size="16" font-weight="700" fill="#0F172A">Opted out</text>
      <text x="1068" y="462" font-size="13" fill="#71717A">Do not message. Read-only.</text>

      <text x="1068" y="516" font-size="48" font-weight="700" fill="#0F172A" letter-spacing="-1">6</text>
      <text x="1068" y="540" font-size="12" fill="#71717A">Excluded from all sends</text>

      <line x1="1068" y1="556" x2="1396" y2="556" stroke="#E4E4E7"/>
      <text x="1068" y="584" font-size="12" font-weight="500" fill="#71717A">Read-only protection</text>
      <text x="1396" y="584" font-size="12" font-weight="500" fill="#71717A" text-anchor="end">View list →</text>
    </g>
  </g>

  <!-- Footer note -->
  <text x="296" y="668" font-size="14" font-weight="600" fill="#0F172A">How segments work</text>
  <line x1="296" y1="680" x2="1416" y2="680" stroke="#F4F4F5"/>
  <g font-size="13" fill="#52525B">
    <text x="296" y="712">All tags are <tspan fill="#0F172A" font-weight="600">automatic</tspan>. They re-evaluate every time a customer transacts —</text>
    <text x="296" y="734">no manual maintenance, no tag drift.</text>

    <text x="296" y="772" fill="#0F172A" font-weight="600">Custom segments</text>
    <text x="296" y="794">Need a custom group (e.g. "buys vitamins on weekends")? Use Custom segments — it's a 4-field</text>
    <text x="296" y="816">filter, never a query builder. Defaults to AND logic. <tspan fill="#3B82F6" font-weight="600">Create custom →</tspan></text>
  </g>

  <text x="296" y="876" font-family="JetBrains Mono, monospace" font-size="11" fill="#A1A1AA">04 / medcrm · Segments · 1440 × 900</text>
</svg>
