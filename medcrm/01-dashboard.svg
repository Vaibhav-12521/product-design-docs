      <rect x="316" y="752" width="514" height="48" rx="10" fill="#FFFFFF" stroke="#E4E4E7" stroke-dasharray="2,3"/>
      <text x="573" y="781" font-size="13" fill="#71717A" text-anchor="middle">+ 18 more in next 7 days</text>
