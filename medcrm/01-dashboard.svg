      <circle cx="346" cy="386" r="20" fill="#FEF3C7"/>
      <text x="346" y="392" font-size="14" text-anchor="middle">🔔</text>
      <text x="376" y="380" font-size="14" font-weight="600" fill="#0F172A">Ramesh Singh</text>
      <text x="376" y="400" font-size="12" fill="#71717A">Amlodipine refill · BP medicine</text>
      <text x="816" y="380" font-size="12" font-weight="600" fill="#0F172A" text-anchor="end">Tomorrow · 9:00 AM</text>
      <text x="816" y="400" font-size="11" fill="#71717A" text-anchor="end">Auto · Template T2</text>
    </g>
    <!-- Row 2 -->
