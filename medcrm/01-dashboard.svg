      <rect x="316" y="432" width="514" height="68" rx="10" fill="#FAFAFA"/>
      <circle cx="346" cy="466" r="20" fill="#FEF3C7"/>
      <text x="346" y="472" font-size="14" text-anchor="middle">🔔</text>
      <text x="376" y="460" font-size="14" font-weight="600" fill="#0F172A">Priya Sharma</text>
      <text x="376" y="480" font-size="12" fill="#71717A">Vitamin D3 refill · Vitamins</text>
      <text x="816" y="460" font-size="12" font-weight="600" fill="#0F172A" text-anchor="end">May 8 · 9:00 AM</text>
      <text x="816" y="480" font-size="11" fill="#71717A" text-anchor="end">Auto · Template T2</text>
    </g>
    <!-- Row 3 -->
    <g>
      <rect x="316" y="512" width="514" height="68" rx="10" fill="#FAFAFA"/>
      <circle cx="346" cy="546" r="20" fill="#FEF3C7"/>
      <text x="346" y="552" font-size="14" text-anchor="middle">🔔</text>
      <text x="376" y="540" font-size="14" font-weight="600" fill="#0F172A">Amit Patel</text>
      <text x="376" y="560" font-size="12" fill="#71717A">Metformin refill · Diabetes</text>
      <text x="816" y="540" font-size="12" font-weight="600" fill="#0F172A" text-anchor="end">May 9 · 9:00 AM</text>
      <text x="816" y="560" font-size="11" fill="#71717A" text-anchor="end">Auto · Template T2</text>
    </g>
    <!-- Row 4 (Batch) -->
    <g>
      <rect x="316" y="592" width="514" height="68" rx="10" fill="#FFFFFF" stroke="#DBEAFE"/>
      <circle cx="346" cy="626" r="20" fill="#DBEAFE"/>
      <text x="346" y="632" font-size="14" text-anchor="middle">📣</text>
      <text x="376" y="620" font-size="14" font-weight="600" fill="#0F172A">Win-back batch · Inactive</text>
      <text x="376" y="640" font-size="12" fill="#71717A">47 customers · "We miss you" template</text>
      <text x="816" y="620" font-size="12" font-weight="600" fill="#0F172A" text-anchor="end">May 10 · 10:00 AM</text>
      <text x="816" y="640" font-size="11" fill="#71717A" text-anchor="end">Manual approval needed</text>
    </g>
    <!-- Row 5 -->
    <g>
      <rect x="316" y="672" width="514" height="68" rx="10" fill="#FAFAFA"/>
      <circle cx="346" cy="706" r="20" fill="#FEF3C7"/>
      <text x="346" y="712" font-size="14" text-anchor="middle">🔔</text>
      <text x="376" y="700" font-size="14" font-weight="600" fill="#0F172A">Divya Nair</text>
      <text x="376" y="720" font-size="12" fill="#71717A">Atorvastatin refill · Cardio</text>
      <text x="816" y="700" font-size="12" font-weight="600" fill="#0F172A" text-anchor="end">May 11 · 9:00 AM</text>
      <text x="816" y="720" font-size="11" fill="#71717A" text-anchor="end">Auto · Template T2</text>
    </g>
    <!-- Row 6 -->
