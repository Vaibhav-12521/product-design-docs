  <circle cx="38" cy="851" r="16" fill="#DBEAFE"/>
  <text x="38" y="856" font-size="11" font-weight="700" fill="#1D4ED8" text-anchor="middle">RS</text>
  <text x="62" y="848" font-size="13" font-weight="600" fill="#0F172A">Rajesh Singh</text>
  <text x="62" y="864" font-size="11" fill="#71717A">Owner · Sec 14</text>

