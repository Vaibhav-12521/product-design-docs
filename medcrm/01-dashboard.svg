    <text x="296" y="56" font-size="13" fill="#71717A">Customer Relations · Dashboard</text>
    <text x="296" y="92" font-size="32" font-weight="700" fill="#0F172A" letter-spacing="-0.5">Good afternoon, Rajesh</text>
    <text x="296" y="118" font-size="14" fill="#71717A">347 customers · 38% repeat rate · 23 reminders queued</text>

