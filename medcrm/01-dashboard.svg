    <text x="1392" y="368" font-size="13" font-weight="600" fill="#F59E0B" text-anchor="end">8 / 10</text>
    <rect x="900" y="376" width="492" height="6" rx="3" fill="#F4F4F5"/>
    <rect x="900" y="376" width="394" height="6" rx="3" fill="#F59E0B"/>
    <text x="900" y="402" font-size="11" fill="#71717A">Approaching cap. Sends queue automatically.</text>

    <line x1="900" y1="420" x2="1392" y2="420" stroke="#E4E4E7"/>

    <!-- bounce -->
    <text x="900" y="450" font-size="13" font-weight="500" fill="#0F172A">Bounce rate · 24h</text>
    <text x="1392" y="450" font-size="13" font-weight="600" fill="#10B981" text-anchor="end">2.1%</text>
    <rect x="900" y="458" width="492" height="6" rx="3" fill="#F4F4F5"/>
    <rect x="900" y="458" width="103" height="6" rx="3" fill="#10B981"/>

    <!-- opt-out -->
