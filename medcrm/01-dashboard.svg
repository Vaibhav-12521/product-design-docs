    <text x="320" y="226" font-size="36" font-weight="700" fill="#0F172A">38%</text>
    <text x="320" y="252" font-size="12" fill="#10B981">↑ 3 pts vs last month</text>

    <rect x="586" y="156" width="270" height="120" rx="16" fill="#FAFAFA"/>
    <text x="610" y="184" font-size="11" font-weight="600" fill="#71717A" letter-spacing="1">MESSAGES TODAY</text>
    <text x="610" y="226" font-size="36" font-weight="700" fill="#0F172A">42</text>
    <text x="610" y="252" font-size="12" fill="#71717A">15 manual · 27 auto</text>

    <rect x="876" y="156" width="270" height="120" rx="16" fill="#FAFAFA"/>
    <text x="900" y="184" font-size="11" font-weight="600" fill="#71717A" letter-spacing="1">UPCOMING REMINDERS</text>
    <text x="900" y="226" font-size="36" font-weight="700" fill="#0F172A">23</text>
    <text x="900" y="252" font-size="12" fill="#71717A">Next 7 days</text>

