    <text x="900" y="668" font-size="28" font-weight="700" fill="#0F172A">132</text>
    <text x="900" y="688" font-size="11" fill="#71717A">+12 this month</text>

    <rect x="1156" y="604" width="260" height="100" rx="16" fill="#FFFFFF" stroke="#E4E4E7"/>
    <text x="1180" y="632" font-size="11" font-weight="600" fill="#D97706" letter-spacing="1">HIGH VALUE</text>
    <text x="1180" y="668" font-size="28" font-weight="700" fill="#0F172A">41</text>
    <text x="1180" y="688" font-size="11" fill="#71717A">LTV &gt; ₹10K</text>

    <rect x="876" y="720" width="260" height="100" rx="16" fill="#FFFFFF" stroke="#E4E4E7"/>
    <text x="900" y="748" font-size="11" font-weight="600" fill="#71717A" letter-spacing="1">INACTIVE</text>
    <text x="900" y="784" font-size="28" font-weight="700" fill="#0F172A">62</text>
    <text x="900" y="804" font-size="11" fill="#71717A">30+ days no visit</text>

    <rect x="1156" y="720" width="260" height="100" rx="16" fill="#FFFFFF" stroke="#E4E4E7"/>
    <text x="1180" y="748" font-size="11" font-weight="600" fill="#5B21B6" letter-spacing="1">CHRONIC</text>
    <text x="1180" y="784" font-size="28" font-weight="700" fill="#0F172A">38</text>
    <text x="1180" y="804" font-size="11" fill="#71717A">Long-term meds</text>
  </g>

  <text x="296" y="876" font-family="JetBrains Mono, monospace" font-size="11" fill="#A1A1AA">01 / medcrm · Dashboard · 1440 × 900</text>
</svg>
