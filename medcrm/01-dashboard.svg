<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" font-family="Inter, system-ui, sans-serif">
  <title>medcrm — Dashboard</title>
  <rect width="1440" height="900" fill="#FFFFFF"/>

  <!-- ─────── SIDEBAR ─────── -->
  <defs>
    <linearGradient id="side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FAFAFA"/>
      <stop offset="1" stop-color="#F4F4F5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="260" height="900" fill="url(#side)"/>
  <line x1="260" y1="0" x2="260" y2="900" stroke="#E4E4E7"/>

  <!-- Brand -->
  <rect x="20" y="20" width="36" height="36" rx="9" fill="#3B82F6"/>
  <text x="38" y="43" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">M</text>
  <text x="68" y="36" font-size="14" font-weight="700" fill="#0F172A">Medstocksy</text>
  <text x="68" y="51" font-size="11" fill="#71717A">Customer Relations</text>
  <line x1="20" y1="76" x2="240" y2="76" stroke="#E4E4E7"/>

  <!-- Section labels -->
  <text x="20" y="104" font-size="11" font-weight="600" fill="#A1A1AA" letter-spacing="1">INVENTORY</text>
  <g font-size="14" font-weight="500" fill="#52525B">
    <text x="48" y="136">Overview</text>
    <text x="48" y="166">Products</text>
    <text x="48" y="196">Sales</text>
    <text x="48" y="226">Suppliers</text>
    <text x="48" y="256">Reports</text>
  </g>
  <g fill="#A1A1AA" font-size="14">
    <text x="20" y="136">⌂</text>
    <text x="20" y="166">📦</text>
    <text x="20" y="196">🛒</text>
    <text x="20" y="226">🚚</text>
    <text x="20" y="256">📊</text>
  </g>

  <text x="20" y="296" font-size="11" font-weight="600" fill="#A1A1AA" letter-spacing="1">CUSTOMER RELATIONS</text>
  <!-- active item with colored bar -->
  <rect x="14" y="312" width="232" height="40" rx="10" fill="#EFF6FF"/>
  <rect x="14" y="312" width="3" height="40" rx="2" fill="#3B82F6"/>
  <text x="48" y="338" font-size="14" font-weight="600" fill="#1D4ED8">Dashboard</text>
  <text x="20" y="338" font-size="14">📊</text>

  <g font-size="14" font-weight="500" fill="#52525B">
    <text x="48" y="378">Customers</text>
    <text x="48" y="408">Segments</text>
    <text x="48" y="438">Campaigns</text>
    <text x="48" y="468">Reminders</text>
    <text x="48" y="498">Templates</text>
    <text x="48" y="528">Activity</text>
  </g>
  <g font-size="14" fill="#A1A1AA">
    <text x="20" y="378">👥</text>
    <text x="20" y="408">🎯</text>
    <text x="20" y="438">📣</text>
    <text x="20" y="468">🔔</text>
    <text x="20" y="498">📝</text>
    <text x="20" y="528">⏱</text>
