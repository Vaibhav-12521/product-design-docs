    <text x="1392" y="498" font-size="13" font-weight="600" fill="#10B981" text-anchor="end">1.4%</text>
    <rect x="900" y="506" width="492" height="6" rx="3" fill="#F4F4F5"/>
    <rect x="900" y="506" width="69" height="6" rx="3" fill="#10B981"/>

    <text x="1392" y="536" font-size="11" fill="#71717A" text-anchor="end">Window: 9 AM – 8 PM IST</text>
  </g>

