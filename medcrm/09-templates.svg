<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" font-family="Inter, system-ui, sans-serif">
  <title>medcrm — Templates</title>
  <rect width="1440" height="900" fill="#FFFFFF"/>

  <defs>
    <linearGradient id="side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FAFAFA"/>
      <stop offset="1" stop-color="#F4F4F5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="260" height="900" fill="url(#side)"/>
  <line x1="260" y1="0" x2="260" y2="900" stroke="#E4E4E7"/>
  <rect x="20" y="20" width="36" height="36" rx="9" fill="#3B82F6"/>
  <text x="38" y="43" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">M</text>
  <text x="68" y="36" font-size="14" font-weight="700" fill="#0F172A">Medstocksy</text>
  <text x="68" y="51" font-size="11" fill="#71717A">Customer Relations</text>

  <g font-size="14" font-weight="500" fill="#52525B">
    <text x="20" y="266" font-size="11" font-weight="600" fill="#A1A1AA" letter-spacing="1">CUSTOMER RELATIONS</text>
    <text x="48" y="298">Dashboard</text>
    <text x="48" y="338">Customers</text>
    <text x="48" y="378">Segments</text>
    <text x="48" y="418">Campaigns</text>
    <text x="48" y="458">Reminders</text>
  </g>
  <rect x="14" y="472" width="232" height="40" rx="10" fill="#EFF6FF"/>
  <rect x="14" y="472" width="3" height="40" rx="2" fill="#3B82F6"/>
  <text x="48" y="498" font-size="14" font-weight="600" fill="#1D4ED8">Templates</text>
  <text x="48" y="538" font-size="14" font-weight="500" fill="#52525B">Activity</text>

  <!-- Header -->
  <text x="296" y="56" font-size="13" fill="#71717A">Customer Relations / Templates</text>
  <text x="296" y="92" font-size="32" font-weight="700" fill="#0F172A" letter-spacing="-0.5">Message templates</text>
  <text x="296" y="118" font-size="14" fill="#71717A">3 pre-built · 2 custom · all WhatsApp-approved</text>

  <rect x="1306" y="68" width="110" height="44" rx="22" fill="#3B82F6"/>
  <text x="1361" y="94" font-size="13" font-weight="600" fill="#FFFFFF" text-anchor="middle">+ New</text>

  <!-- Tabs -->
  <g font-size="14" font-weight="500">
    <text x="296" y="172" fill="#0F172A" font-weight="600">All</text>
    <line x1="296" y1="182" x2="320" y2="182" stroke="#3B82F6" stroke-width="2"/>
    <text x="350" y="172" fill="#71717A">Pre-built</text>
    <text x="436" y="172" fill="#71717A">Custom</text>
    <text x="514" y="172" fill="#71717A">Pending review</text>
  </g>
  <line x1="296" y1="182" x2="1416" y2="182" stroke="#F4F4F5"/>

  <!-- ─────── TEMPLATE CARDS (3 cols) ─────── -->
  <g id="cards">
    <!-- Card 1 -->
    <g>
      <rect x="296" y="208" width="356" height="316" rx="20" fill="#FFFFFF" stroke="#E4E4E7"/>
      <text x="320" y="240" font-size="11" font-weight="700" fill="#3B82F6" letter-spacing="1">T1</text>
      <text x="356" y="240" font-size="11" font-weight="500" fill="#71717A">PRE-BUILT</text>
      <text x="320" y="268" font-size="18" font-weight="700" fill="#0F172A">Thank you</text>
      <text x="320" y="288" font-size="12" fill="#71717A">Post-purchase confirmation</text>

      <rect x="320" y="308" width="308" height="140" rx="12" fill="#E7FFDB"/>
      <text x="336" y="334" font-size="12" fill="#0F172A">Hi {name},</text>
      <text x="336" y="356" font-size="12" fill="#0F172A">Thank you for shopping at</text>
      <text x="336" y="372" font-size="12" fill="#0F172A">{pharmacy_name}!</text>
      <text x="336" y="394" font-size="12" fill="#0F172A">Your bill {amount} has been</text>
      <text x="336" y="410" font-size="12" fill="#0F172A">saved to our system.</text>

      <line x1="320" y1="468" x2="628" y2="468" stroke="#F4F4F5"/>
      <text x="320" y="494" font-size="11" fill="#71717A">Used in 482 sends</text>
      <text x="628" y="494" font-size="11" font-weight="600" fill="#10B981" text-anchor="end">98% delivery</text>
    </g>

    <!-- Card 2 -->
    <g>
      <rect x="672" y="208" width="356" height="316" rx="20" fill="#FFFFFF" stroke="#E4E4E7"/>
      <text x="696" y="240" font-size="11" font-weight="700" fill="#3B82F6" letter-spacing="1">T2</text>
      <text x="732" y="240" font-size="11" font-weight="500" fill="#71717A">PRE-BUILT</text>
      <text x="696" y="268" font-size="18" font-weight="700" fill="#0F172A">Refill reminder</text>
      <text x="696" y="288" font-size="12" fill="#71717A">Auto-triggered by reminder rules</text>

      <rect x="696" y="308" width="308" height="140" rx="12" fill="#E7FFDB"/>
      <text x="712" y="334" font-size="12" fill="#0F172A">Hi {name},</text>
      <text x="712" y="356" font-size="12" fill="#0F172A">Time to refill your</text>
      <text x="712" y="372" font-size="12" fill="#0F172A">{medicine_name}?</text>
      <text x="712" y="394" font-size="12" fill="#0F172A">We have it in stock.</text>
      <text x="712" y="416" font-size="12" fill="#0F172A">Call: {pharmacy_phone}</text>

      <line x1="696" y1="468" x2="1004" y2="468" stroke="#F4F4F5"/>
      <text x="696" y="494" font-size="11" fill="#71717A">Used in 168 sends</text>
      <text x="1004" y="494" font-size="11" font-weight="600" fill="#10B981" text-anchor="end">42% reply</text>
    </g>

    <!-- Card 3 (HOT) -->
    <g>
      <rect x="1048" y="208" width="368" height="316" rx="20" fill="#0F172A"/>
      <text x="1072" y="240" font-size="11" font-weight="700" fill="#FBBF24" letter-spacing="1">T3</text>
      <text x="1108" y="240" font-size="11" font-weight="500" fill="#A1A1AA">PRE-BUILT</text>
      <rect x="1340" y="226" width="64" height="22" rx="11" fill="#FBBF24"/>
      <text x="1372" y="241" font-size="11" font-weight="700" fill="#0F172A" text-anchor="middle">POPULAR</text>
      <text x="1072" y="268" font-size="18" font-weight="700" fill="#FFFFFF">Special offer</text>
      <text x="1072" y="288" font-size="12" fill="#A1A1AA">Time-bound discount campaign</text>

      <rect x="1072" y="308" width="320" height="140" rx="12" fill="#E7FFDB"/>
      <text x="1088" y="334" font-size="12" fill="#0F172A">Hi {name},</text>
      <text x="1088" y="356" font-size="12" fill="#0F172A">Special offer on {category}:</text>
      <text x="1088" y="372" font-size="12" fill="#0F172A">{discount}% off!</text>
      <text x="1088" y="394" font-size="12" fill="#0F172A">Valid till {date}.</text>
      <text x="1088" y="416" font-size="12" fill="#0F172A">Limited stock. Order now.</text>

      <line x1="1072" y1="468" x2="1392" y2="468" stroke="#1E293B"/>
      <text x="1072" y="494" font-size="11" fill="#A1A1AA">Used in 96 sends</text>
      <text x="1392" y="494" font-size="11" font-weight="600" fill="#FBBF24" text-anchor="end">36% reply · ₹38K rev</text>
    </g>

    <!-- Card 4 (custom) -->
    <g>
      <rect x="296" y="544" width="356" height="240" rx="20" fill="#FFFFFF" stroke="#E4E4E7"/>
      <text x="320" y="576" font-size="11" font-weight="700" fill="#5B21B6" letter-spacing="1">C1</text>
      <text x="356" y="576" font-size="11" font-weight="500" fill="#71717A">CUSTOM · BY YOU</text>
      <text x="320" y="604" font-size="18" font-weight="700" fill="#0F172A">Win-back · Inactive</text>
      <text x="320" y="624" font-size="12" fill="#71717A">For 30+ days inactive customers</text>

      <rect x="320" y="644" width="308" height="92" rx="12" fill="#FAFAFA"/>
      <text x="336" y="670" font-size="12" fill="#0F172A">Hi {name}, we miss you!</text>
      <text x="336" y="688" font-size="12" fill="#0F172A">It's been a while.</text>
      <text x="336" y="708" font-size="12" fill="#0F172A">10% off your next visit.</text>
    </g>

    <!-- Card 5 (custom) -->
    <g>
      <rect x="672" y="544" width="356" height="240" rx="20" fill="#FFFFFF" stroke="#E4E4E7"/>
      <text x="696" y="576" font-size="11" font-weight="700" fill="#5B21B6" letter-spacing="1">C2</text>
      <text x="732" y="576" font-size="11" font-weight="500" fill="#71717A">CUSTOM · BY YOU</text>
      <text x="696" y="604" font-size="18" font-weight="700" fill="#0F172A">Out-of-stock notify</text>
      <text x="696" y="624" font-size="12" fill="#71717A">When requested medicine arrives</text>

      <rect x="696" y="644" width="308" height="92" rx="12" fill="#FAFAFA"/>
      <text x="712" y="670" font-size="12" fill="#0F172A">Hi {name},</text>
      <text x="712" y="688" font-size="12" fill="#0F172A">{medicine_name} is back in stock.</text>
      <text x="712" y="708" font-size="12" fill="#0F172A">Reserve now — limited.</text>
    </g>

    <!-- Card 6 (placeholder) -->
    <g>
      <rect x="1048" y="544" width="368" height="240" rx="20" fill="#FAFAFA" stroke="#E4E4E7" stroke-dasharray="4,3"/>
      <circle cx="1232" cy="664" r="28" fill="#FFFFFF" stroke="#CBD5E1"/>
      <text x="1232" y="672" font-size="22" fill="#A1A1AA" text-anchor="middle">+</text>
      <text x="1232" y="724" font-size="14" font-weight="600" fill="#52525B" text-anchor="middle">Create custom template</text>
      <text x="1232" y="744" font-size="11" fill="#71717A" text-anchor="middle">Goes to WhatsApp for approval</text>
    </g>
  </g>

  <text x="296" y="876" font-family="JetBrains Mono, monospace" font-size="11" fill="#A1A1AA">09 / medcrm · Templates · 1440 × 900</text>
</svg>
