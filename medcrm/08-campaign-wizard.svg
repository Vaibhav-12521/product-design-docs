<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" width="1440" height="900" font-family="Inter, system-ui, sans-serif">
  <title>medcrm — Campaign Wizard (step 2/3)</title>
  <rect width="1440" height="900" fill="#FFFFFF"/>

  <defs>
    <linearGradient id="side" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FAFAFA"/>
      <stop offset="1" stop-color="#F4F4F5"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="260" height="900" fill="url(#side)"/>
  <line x1="260" y1="0" x2="260" y2="900" stroke="#E4E4E7"/>
  <rect x="20" y="20" width="36" height="36" rx="9" fill="#3B82F6"/>
  <text x="38" y="43" font-size="15" font-weight="700" fill="#FFFFFF" text-anchor="middle">M</text>
  <text x="68" y="36" font-size="14" font-weight="700" fill="#0F172A">Medstocksy</text>
  <text x="68" y="51" font-size="11" fill="#71717A">Customer Relations</text>

  <g font-size="14" font-weight="500" fill="#52525B">
    <text x="20" y="266" font-size="11" font-weight="600" fill="#A1A1AA" letter-spacing="1">CUSTOMER RELATIONS</text>
    <text x="48" y="298">Dashboard</text>
    <text x="48" y="338">Customers</text>
    <text x="48" y="378">Segments</text>
  </g>
  <rect x="14" y="392" width="232" height="40" rx="10" fill="#EFF6FF"/>
  <rect x="14" y="392" width="3" height="40" rx="2" fill="#3B82F6"/>
  <text x="48" y="418" font-size="14" font-weight="600" fill="#1D4ED8">Campaigns</text>

  <!-- Header -->
  <text x="296" y="56" font-size="13" fill="#71717A">Campaigns / New campaign</text>
  <text x="296" y="92" font-size="32" font-weight="700" fill="#0F172A" letter-spacing="-0.5">Create campaign</text>

  <!-- Stepper -->
  <g id="stepper">
    <!-- step 1 done -->
    <circle cx="316" cy="160" r="14" fill="#10B981"/>
    <text x="316" y="165" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">✓</text>
    <text x="340" y="165" font-size="14" font-weight="600" fill="#0F172A">Segment</text>
    <line x1="430" y1="160" x2="500" y2="160" stroke="#10B981" stroke-width="2"/>

    <!-- step 2 active -->
    <circle cx="514" cy="160" r="14" fill="#3B82F6"/>
    <text x="514" y="165" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">2</text>
    <text x="538" y="165" font-size="14" font-weight="700" fill="#0F172A">Template</text>
    <line x1="624" y1="160" x2="694" y2="160" stroke="#E4E4E7" stroke-width="2"/>

    <!-- step 3 pending -->
    <circle cx="708" cy="160" r="14" fill="#F4F4F5"/>
    <text x="708" y="165" font-size="12" font-weight="700" fill="#A1A1AA" text-anchor="middle">3</text>
    <text x="732" y="165" font-size="14" font-weight="500" fill="#A1A1AA">Schedule &amp; review</text>
  </g>

  <!-- ─────── LEFT: TEMPLATE PICKER ─────── -->
  <g id="picker">
    <!-- Selected segment summary -->
    <rect x="296" y="200" width="700" height="64" rx="14" fill="#0F172A"/>
    <text x="320" y="226" font-size="11" font-weight="600" fill="#A1A1AA" letter-spacing="1">SELECTED SEGMENT</text>
    <text x="320" y="252" font-size="16" font-weight="700" fill="#FFFFFF">High Value · 41 customers · 0 opted-out</text>
    <rect x="908" y="216" width="68" height="32" rx="16" fill="#1E293B"/>
    <text x="942" y="237" font-size="12" font-weight="500" fill="#FFFFFF" text-anchor="middle">Change</text>

    <text x="296" y="304" font-size="20" font-weight="700" fill="#0F172A">Choose template</text>
    <text x="296" y="326" font-size="13" fill="#71717A">Pick a pre-approved template. Variables fill from the segment automatically.</text>

    <!-- Template card 1 -->
    <rect x="296" y="356" width="700" height="100" rx="16" fill="#FFFFFF" stroke="#E4E4E7"/>
    <circle cx="324" cy="394" r="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text x="350" y="386" font-size="15" font-weight="700" fill="#0F172A">T1 · Thank you</text>
    <text x="350" y="408" font-size="12" fill="#71717A">Best for: post-purchase confirmation, welcome flow.</text>
    <text x="350" y="430" font-size="11" fill="#A1A1AA" font-style="italic">"Hi {name}, thank you for shopping at Medstocksy. Your bill {amount} is saved…"</text>

    <!-- Template card 2 (selected) -->
    <rect x="296" y="476" width="700" height="120" rx="16" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
    <circle cx="324" cy="514" r="10" fill="#3B82F6"/>
    <circle cx="324" cy="514" r="4" fill="#FFFFFF"/>
    <text x="350" y="506" font-size="15" font-weight="700" fill="#0F172A">T3 · Special offer</text>
    <rect x="486" y="492" width="100" height="22" rx="11" fill="#FEF3C7"/>
    <text x="536" y="507" font-size="11" font-weight="700" fill="#92400E" text-anchor="middle">RECOMMENDED</text>
    <text x="350" y="528" font-size="12" fill="#71717A">Best for: time-bound discount on a category.</text>
    <text x="350" y="552" font-size="11" fill="#52525B" font-style="italic">"Hi {name}, special offer on {category}: {discount}% off! Valid till {date}…"</text>

    <text x="350" y="578" font-size="11" font-weight="600" fill="#3B82F6">3 variables · category · discount · date</text>

    <!-- Template card 3 -->
    <rect x="296" y="616" width="700" height="100" rx="16" fill="#FFFFFF" stroke="#E4E4E7"/>
    <circle cx="324" cy="654" r="10" fill="#FFFFFF" stroke="#CBD5E1" stroke-width="2"/>
    <text x="350" y="646" font-size="15" font-weight="700" fill="#0F172A">T2 · Refill reminder</text>
    <text x="350" y="668" font-size="12" fill="#71717A">Better for one-to-one refill reminders, not bulk offers.</text>
    <text x="350" y="690" font-size="11" fill="#A1A1AA" font-style="italic">"Hi {name}, time to refill your {medicine}? We have it in stock…"</text>

    <!-- Variable inputs -->
    <text x="296" y="752" font-size="13" font-weight="600" fill="#0F172A">Fill template variables</text>
    <g>
      <text x="296" y="780" font-size="11" fill="#71717A">Category</text>
      <rect x="296" y="788" width="220" height="44" rx="12" fill="#FFFFFF" stroke="#E4E4E7"/>
      <text x="316" y="816" font-size="14" fill="#0F172A">Vitamins</text>
      <text x="498" y="816" font-size="14" fill="#71717A" text-anchor="end">▾</text>

      <text x="536" y="780" font-size="11" fill="#71717A">Discount %</text>
      <rect x="536" y="788" width="220" height="44" rx="12" fill="#FFFFFF" stroke="#E4E4E7"/>
      <text x="556" y="816" font-size="14" font-family="JetBrains Mono, monospace" fill="#0F172A">20</text>

      <text x="776" y="780" font-size="11" fill="#71717A">Valid till</text>
      <rect x="776" y="788" width="220" height="44" rx="12" fill="#FFFFFF" stroke="#E4E4E7"/>
      <text x="796" y="816" font-size="14" fill="#0F172A">May 31, 2026</text>
    </g>
  </g>

  <!-- ─────── RIGHT: PREVIEW + SAFETY ─────── -->
  <g id="right">
    <!-- preview -->
    <text x="1036" y="226" font-size="11" font-weight="600" fill="#A1A1AA" letter-spacing="1">LIVE PREVIEW · DIVYA NAIR</text>

    <rect x="1036" y="240" width="380" height="240" rx="18" fill="#E7FFDB"/>
    <text x="1060" y="276" font-size="14" fill="#0F172A">Hi <tspan font-weight="700">Divya</tspan>,</text>
    <text x="1060" y="306" font-size="14" fill="#0F172A">Special offer on <tspan font-weight="700">vitamins</tspan>:</text>
    <text x="1060" y="328" font-size="14" font-weight="700" fill="#0F172A">20% off!</text>
    <text x="1060" y="358" font-size="14" fill="#0F172A">Valid till <tspan font-weight="700">May 31</tspan>.</text>
    <text x="1060" y="388" font-size="14" fill="#0F172A">Limited stock. Order now.</text>
    <text x="1392" y="448" font-size="11" fill="#71717A" text-anchor="end" font-family="JetBrains Mono, monospace">2:34 PM ✓</text>

    <!-- Safety -->
    <text x="1036" y="510" font-size="11" font-weight="600" fill="#A1A1AA" letter-spacing="1">SEND SAFETY</text>

    <g font-size="13" fill="#0F172A">
      <text x="1036" y="540">✓</text>
      <text x="1056" y="540">41 recipients · all opted-in</text>

      <text x="1036" y="568">✓</text>
      <text x="1056" y="568">Below bulk-approval threshold (100)</text>

      <text x="1036" y="596">✓</text>
      <text x="1056" y="596">Auto-paced 10/hr · ~5 hours total</text>

      <text x="1036" y="624">✓</text>
      <text x="1056" y="624">Within send window (9 AM – 8 PM)</text>
    </g>

    <!-- subtle warn box -->
    <rect x="1036" y="652" width="380" height="64" rx="14" fill="#FFFBEB" stroke="#FCD34D"/>
    <text x="1060" y="680" font-size="13" font-weight="600" fill="#92400E">⚠  Heads up</text>
    <text x="1060" y="700" font-size="11" fill="#92400E">Sends &gt; 100 recipients require admin approval. This batch is fine.</text>
  </g>

  <!-- ─────── WIZARD FOOTER ─────── -->
  <line x1="296" y1="836" x2="1416" y2="836" stroke="#E4E4E7"/>
  <rect x="296" y="836" width="100" height="44" rx="22" fill="#FFFFFF"/>
  <text x="346" y="863" font-size="13" font-weight="500" fill="#52525B" text-anchor="middle">‹ Back</text>

  <rect x="1212" y="836" width="100" height="44" rx="22" fill="#FFFFFF" stroke="#E4E4E7"/>
  <text x="1262" y="863" font-size="13" font-weight="500" fill="#0F172A" text-anchor="middle">Save draft</text>

  <rect x="1322" y="836" width="94" height="44" rx="22" fill="#3B82F6"/>
  <text x="1369" y="863" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">Continue ›</text>

  <text x="296" y="894" font-family="JetBrains Mono, monospace" font-size="11" fill="#A1A1AA" opacity="0.7">08 / medcrm · Campaign wizard · step 2 of 3 · 1440 × 900</text>
</svg>
