<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800" font-family="Inter, sans-serif">
  <title>Lucknow Metro Fare V2 — Redesign Wireframe</title>
  <rect width="1280" height="800" fill="#F8FAFC"/>

  <!-- TOP NAV -->
  <g id="nav">
    <rect x="0" y="0" width="1280" height="64" fill="#0F172A"/>
    <rect x="32" y="18" width="32" height="28" rx="6" fill="#10B981"/>
    <text x="48" y="37" font-size="13" font-weight="700" fill="#FFFFFF" text-anchor="middle">M</text>
    <text x="76" y="38" font-size="14" font-weight="600" fill="#FFFFFF">Lucknow Metro</text>
    <g font-size="13" font-weight="500" fill="#CBD5E1">
      <text x="940" y="38">Fare</text>
      <text x="990" y="38">Routes</text>
      <text x="1056" y="38">Timings</text>
      <text x="1126" y="38">Help</text>
    </g>
    <rect x="1180" y="14" width="68" height="36" rx="8" fill="#10B981"/>
    <text x="1214" y="38" font-size="13" font-weight="500" fill="#FFFFFF" text-anchor="middle">EN ▾</text>
  </g>

  <!-- HERO -->
  <g id="hero">
    <text x="640" y="120" font-size="32" font-weight="700" fill="#0F172A" text-anchor="middle">Plan your journey</text>
    <text x="640" y="148" font-size="14" fill="#475569" text-anchor="middle">Calculate fare, time, and interchanges across the Red &amp; Blue lines.</text>
  </g>

  <!-- FORM CARD -->
  <g id="form">
    <rect x="120" y="180" width="640" height="220" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>

    <!-- From -->
    <text x="148" y="216" font-size="12" font-weight="600" fill="#475569" letter-spacing="1">FROM</text>
    <rect x="148" y="226" width="276" height="48" rx="10" fill="#F8FAFC" stroke="#CBD5E1"/>
    <circle cx="172" cy="250" r="8" fill="#EF4444"/>
    <text x="190" y="255" font-size="14" font-weight="500" fill="#0F172A">CCS Airport</text>
    <text x="190" y="268" font-size="11" fill="#94A3B8" display="none">Auto-suggest as you type</text>

    <!-- swap -->
    <rect x="436" y="234" width="32" height="32" rx="16" fill="#EFF6FF" stroke="#DBEAFE"/>
    <text x="452" y="254" font-size="14" fill="#1E40AF" text-anchor="middle">⇆</text>

    <!-- To -->
    <text x="480" y="216" font-size="12" font-weight="600" fill="#475569" letter-spacing="1">TO</text>
    <rect x="480" y="226" width="252" height="48" rx="10" fill="#F8FAFC" stroke="#CBD5E1"/>
    <circle cx="504" cy="250" r="8" fill="#10B981"/>
    <text x="522" y="255" font-size="14" font-weight="500" fill="#0F172A">Munshipulia</text>

    <!-- Travel options -->
    <g font-size="13" fill="#475569">
      <rect x="148" y="298" width="124" height="36" rx="18" fill="#EFF6FF" stroke="#2563EB"/>
      <text x="210" y="320" font-weight="500" fill="#1E40AF" text-anchor="middle">🎟️ Single ride</text>
      <rect x="280" y="298" width="124" height="36" rx="18" fill="#FFFFFF" stroke="#CBD5E1"/>
      <text x="342" y="320" text-anchor="middle">🔁 Return</text>
      <rect x="412" y="298" width="124" height="36" rx="18" fill="#FFFFFF" stroke="#CBD5E1"/>
      <text x="474" y="320" text-anchor="middle">📅 Day pass</text>
    </g>

    <!-- Calculate button -->
    <rect x="148" y="356" width="584" height="20" display="none"/>
    <rect x="148" y="350" width="584" height="34" rx="10" fill="#10B981"/>
    <text x="440" y="372" font-size="14" font-weight="500" fill="#FFFFFF" text-anchor="middle">Calculate fare →</text>
  </g>

  <!-- RESULT CARD -->
  <g id="result">
    <rect x="800" y="180" width="360" height="220" rx="14" fill="#0F172A"/>
    <text x="824" y="216" font-size="12" font-weight="600" fill="#94A3B8" letter-spacing="1">YOUR FARE</text>

    <text x="824" y="276" font-size="44" font-weight="700" fill="#FFFFFF" font-family="JetBrains Mono, monospace">₹40</text>
    <text x="824" y="302" font-size="13" fill="#94A3B8">Single journey · CCS Airport → Munshipulia</text>

    <line x1="824" y1="320" x2="1136" y2="320" stroke="#1E293B"/>

    <g font-size="12" fill="#94A3B8">
      <text x="824" y="350">Travel time</text>
      <text x="1136" y="350" font-weight="600" fill="#FFFFFF" text-anchor="end" font-family="JetBrains Mono, monospace">42 min</text>

      <text x="824" y="372">Stations</text>
      <text x="1136" y="372" font-weight="600" fill="#FFFFFF" text-anchor="end" font-family="JetBrains Mono, monospace">21</text>
    </g>
  </g>

  <!-- ROUTE PREVIEW -->
  <g id="route">
    <rect x="120" y="430" width="1040" height="180" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="148" y="466" font-size="14" font-weight="600" fill="#0F172A">Your route</text>
    <text x="148" y="486" font-size="12" fill="#475569">Red Line · 21 stations · 0 interchange</text>

    <!-- horizontal route line -->
    <line x1="160" y1="540" x2="1120" y2="540" stroke="#EF4444" stroke-width="4"/>

    <!-- stations (8 visible + ellipsis pattern) -->
    <g>
      <circle cx="160" cy="540" r="8" fill="#FFFFFF" stroke="#EF4444" stroke-width="3"/>
      <text x="160" y="572" font-size="11" font-weight="500" fill="#0F172A" text-anchor="middle">CCS Airport</text>
      <text x="160" y="586" font-size="10" fill="#94A3B8" text-anchor="middle">START</text>
    </g>
    <circle cx="280" cy="540" r="6" fill="#EF4444"/>
    <text x="280" y="572" font-size="10" fill="#475569" text-anchor="middle">Amausi</text>
    <circle cx="400" cy="540" r="6" fill="#EF4444"/>
    <text x="400" y="572" font-size="10" fill="#475569" text-anchor="middle">Transport Nagar</text>
    <circle cx="520" cy="540" r="6" fill="#EF4444"/>
    <text x="520" y="572" font-size="10" fill="#475569" text-anchor="middle">Krishna Nagar</text>
    <circle cx="640" cy="540" r="6" fill="#EF4444"/>
    <text x="640" y="572" font-size="10" fill="#475569" text-anchor="middle">Charbagh</text>
    <circle cx="760" cy="540" r="6" fill="#EF4444"/>
    <text x="760" y="572" font-size="10" fill="#475569" text-anchor="middle">Hazratganj</text>
    <circle cx="880" cy="540" r="6" fill="#EF4444"/>
    <text x="880" y="572" font-size="10" fill="#475569" text-anchor="middle">Kapoorthala</text>
    <circle cx="1000" cy="540" r="6" fill="#EF4444"/>
    <text x="1000" y="572" font-size="10" fill="#475569" text-anchor="middle">IIM Road</text>
    <g>
      <circle cx="1120" cy="540" r="8" fill="#FFFFFF" stroke="#10B981" stroke-width="3"/>
      <text x="1120" y="572" font-size="11" font-weight="500" fill="#0F172A" text-anchor="middle">Munshipulia</text>
      <text x="1120" y="586" font-size="10" fill="#94A3B8" text-anchor="middle">END</text>
    </g>
  </g>

  <!-- FARE SLAB INFO -->
  <g id="slabs">
    <rect x="120" y="640" width="500" height="120" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="148" y="676" font-size="14" font-weight="600" fill="#0F172A">Fare slabs</text>
    <g font-size="12" fill="#475569">
      <text x="148" y="704">0–2 km</text><text x="248" y="704" font-family="JetBrains Mono, monospace" fill="#0F172A" font-weight="500">₹10</text>
      <text x="148" y="724">2–6 km</text><text x="248" y="724" font-family="JetBrains Mono, monospace" fill="#0F172A" font-weight="500">₹15</text>
      <text x="148" y="744">6–12 km</text><text x="248" y="744" font-family="JetBrains Mono, monospace" fill="#0F172A" font-weight="500">₹20</text>
      <text x="320" y="704">12–18 km</text><text x="440" y="704" font-family="JetBrains Mono, monospace" fill="#0F172A" font-weight="500">₹30</text>
      <text x="320" y="724">18–22 km</text><text x="440" y="724" font-family="JetBrains Mono, monospace" fill="#10B981" font-weight="600">₹40 ✓</text>
      <text x="320" y="744">22+ km</text><text x="440" y="744" font-family="JetBrains Mono, monospace" fill="#0F172A" font-weight="500">₹60</text>
    </g>
  </g>

  <!-- RECENT SEARCHES -->
  <g id="recent">
    <rect x="660" y="640" width="500" height="120" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="688" y="676" font-size="14" font-weight="600" fill="#0F172A">Recent searches</text>
    <g font-size="12">
      <text x="688" y="706" fill="#0F172A">CCS Airport → Hazratganj</text>
      <text x="1132" y="706" fill="#94A3B8" text-anchor="end" font-family="JetBrains Mono, monospace">₹30 · 28 min</text>
      <text x="688" y="730" fill="#0F172A">Charbagh → IIM Road</text>
      <text x="1132" y="730" fill="#94A3B8" text-anchor="end" font-family="JetBrains Mono, monospace">₹20 · 18 min</text>
      <text x="688" y="754" fill="#0F172A">Munshipulia → Charbagh</text>
      <text x="1132" y="754" fill="#94A3B8" text-anchor="end" font-family="JetBrains Mono, monospace">₹30 · 24 min</text>
    </g>
  </g>

  <text x="32" y="788" font-family="JetBrains Mono, monospace" font-size="11" fill="#94A3B8">04 / Lucknow-Metro-Fare-V2 · Calculator + route preview · 1280 × 800</text>
</svg>
