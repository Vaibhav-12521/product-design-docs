    <!-- Topic title -->
    <text x="320" y="132" font-size="28" font-weight="600" fill="#0F172A">Prefix sums</text>
    <text x="320" y="158" font-size="14" fill="#475569">Pre-compute cumulative sums to answer range queries in O(1).</text>

    <!-- Pills -->
    <g font-size="11" font-weight="500">
      <rect x="320" y="178" width="68" height="24" rx="4" fill="#FEF3C7"/><text x="354" y="194" fill="#92400E" text-anchor="middle">Medium</text>
      <rect x="396" y="178" width="64" height="24" rx="4" fill="#DBEAFE"/><text x="428" y="194" fill="#1E40AF" text-anchor="middle">15 min</text>
      <rect x="468" y="178" width="84" height="24" rx="4" fill="#D1FAE5"/><text x="510" y="194" fill="#047857" text-anchor="middle">12 problems</text>
    </g>

    <!-- THEORY CARD -->
    <rect x="320" y="226" width="600" height="290" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="344" y="262" font-size="11" font-weight="600" fill="#475569" letter-spacing="1">CONCEPT</text>
    <text x="344" y="294" font-size="14" fill="#0F172A">Given an array A of length n, the prefix sum array P satisfies:</text>
    <rect x="344" y="312" width="552" height="36" rx="6" fill="#F8FAFC"/>
    <text x="360" y="335" font-size="13" font-family="JetBrains Mono, monospace" fill="#0F172A">P[i] = A[0] + A[1] + ... + A[i]</text>

    <text x="344" y="376" font-size="14" fill="#0F172A">A range sum from index l to r becomes:</text>
    <rect x="344" y="392" width="552" height="36" rx="6" fill="#F8FAFC"/>
    <text x="360" y="415" font-size="13" font-family="JetBrains Mono, monospace" fill="#0F172A">sum(l, r) = P[r] − P[l−1]</text>

    <text x="344" y="456" font-size="14" fill="#0F172A">→ Each query answered in <tspan font-weight="600" fill="#10B981">O(1)</tspan> after O(n) preprocessing.</text>

    <text x="344" y="492" font-size="13" fill="#475569">Read full theory →</text>

    <!-- VISUAL CARD -->
    <rect x="936" y="226" width="312" height="290" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="956" y="262" font-size="11" font-weight="600" fill="#475569" letter-spacing="1">VISUAL</text>

    <!-- Array A -->
    <text x="956" y="294" font-size="12" fill="#475569">A:</text>
    <g font-family="JetBrains Mono, monospace" font-size="13">
      <rect x="976" y="278" width="36" height="32" rx="4" fill="#F8FAFC" stroke="#CBD5E1"/><text x="994" y="299" text-anchor="middle">3</text>
      <rect x="1014" y="278" width="36" height="32" rx="4" fill="#F8FAFC" stroke="#CBD5E1"/><text x="1032" y="299" text-anchor="middle">1</text>
      <rect x="1052" y="278" width="36" height="32" rx="4" fill="#F8FAFC" stroke="#CBD5E1"/><text x="1070" y="299" text-anchor="middle">4</text>
      <rect x="1090" y="278" width="36" height="32" rx="4" fill="#F8FAFC" stroke="#CBD5E1"/><text x="1108" y="299" text-anchor="middle">1</text>
      <rect x="1128" y="278" width="36" height="32" rx="4" fill="#F8FAFC" stroke="#CBD5E1"/><text x="1146" y="299" text-anchor="middle">5</text>
      <rect x="1166" y="278" width="36" height="32" rx="4" fill="#F8FAFC" stroke="#CBD5E1"/><text x="1184" y="299" text-anchor="middle">9</text>
    </g>

    <!-- Array P -->
    <text x="956" y="346" font-size="12" fill="#475569">P:</text>
    <g font-family="JetBrains Mono, monospace" font-size="13">
      <rect x="976" y="330" width="36" height="32" rx="4" fill="#DBEAFE" stroke="#2563EB"/><text x="994" y="351" text-anchor="middle" fill="#1E40AF" font-weight="600">3</text>
      <rect x="1014" y="330" width="36" height="32" rx="4" fill="#DBEAFE" stroke="#2563EB"/><text x="1032" y="351" text-anchor="middle" fill="#1E40AF" font-weight="600">4</text>
      <rect x="1052" y="330" width="36" height="32" rx="4" fill="#DBEAFE" stroke="#2563EB"/><text x="1070" y="351" text-anchor="middle" fill="#1E40AF" font-weight="600">8</text>
      <rect x="1090" y="330" width="36" height="32" rx="4" fill="#DBEAFE" stroke="#2563EB"/><text x="1108" y="351" text-anchor="middle" fill="#1E40AF" font-weight="600">9</text>
      <rect x="1128" y="330" width="36" height="32" rx="4" fill="#DBEAFE" stroke="#2563EB"/><text x="1146" y="351" text-anchor="middle" fill="#1E40AF" font-weight="600">14</text>
      <rect x="1166" y="330" width="36" height="32" rx="4" fill="#DBEAFE" stroke="#2563EB"/><text x="1184" y="351" text-anchor="middle" fill="#1E40AF" font-weight="600">23</text>
    </g>

    <text x="956" y="394" font-size="11" fill="#94A3B8">Query sum(2, 4):</text>
    <text x="956" y="416" font-size="13" font-family="JetBrains Mono, monospace" fill="#0F172A">P[4] - P[1] = 14 - 4 = <tspan fill="#10B981" font-weight="600">10</tspan></text>

    <line x1="956" y1="446" x2="1228" y2="446" stroke="#E2E8F0"/>
    <text x="956" y="476" font-size="12" fill="#475569">Try it interactive →</text>

    <!-- CODE CARD -->
    <rect x="320" y="540" width="928" height="240" rx="14" fill="#0F172A"/>
    <rect x="320" y="540" width="928" height="40" rx="14" fill="#1E293B"/>
    <text x="344" y="566" font-size="12" font-weight="500" fill="#94A3B8">prefix_sum.py</text>
    <g font-size="11" fill="#475569" font-weight="500">
      <text x="1100" y="566">Python</text>
      <text x="1158" y="566">C++</text>
      <text x="1200" y="566">Java</text>
    </g>

    <g font-family="JetBrains Mono, monospace" font-size="13" fill="#E2E8F0">
      <text x="344" y="608"><tspan fill="#94A3B8">def</tspan> <tspan fill="#60A5FA">build_prefix</tspan>(arr):</text>
      <text x="344" y="632">    P = [<tspan fill="#FBBF24">0</tspan>] * <tspan fill="#FBBF24">len</tspan>(arr)</text>
      <text x="344" y="656">    P[<tspan fill="#FBBF24">0</tspan>] = arr[<tspan fill="#FBBF24">0</tspan>]</text>
      <text x="344" y="680">    <tspan fill="#94A3B8">for</tspan> i <tspan fill="#94A3B8">in</tspan> <tspan fill="#FBBF24">range</tspan>(<tspan fill="#FBBF24">1</tspan>, <tspan fill="#FBBF24">len</tspan>(arr)):</text>
      <text x="344" y="704">        P[i] = P[i-<tspan fill="#FBBF24">1</tspan>] + arr[i]</text>
      <text x="344" y="728">    <tspan fill="#94A3B8">return</tspan> P</text>
      <text x="344" y="752"></text>
      <text x="344" y="752" fill="#475569"># Range sum: P[r] − (P[l-1] if l &gt; 0 else 0)</text>
    </g>

    <!-- Action bar -->
    <g>
      <rect x="320" y="804" width="928" height="60" rx="14" fill="#FFFFFF" stroke="#E2E8F0"/>
      <text x="344" y="830" font-size="13" font-weight="500" fill="#0F172A">Ready to practice?</text>
      <text x="344" y="848" font-size="12" fill="#475569">12 problems on prefix sums · ~90 min total</text>

